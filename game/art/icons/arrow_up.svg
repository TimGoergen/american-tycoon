<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Up arrow = "expand all" (the sections open up). Navy strokes to read on the gold utility
       button. Drawn as strokes (the SVG importer embeds no fonts). -->
