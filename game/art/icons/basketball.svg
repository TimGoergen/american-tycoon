<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <!-- Round basketball: orange body, dark seams, a soft highlight for a little depth. -->
  <circle cx="48" cy="48" r="44" fill="#D9702B" stroke="#3A2415" stroke-width="3"/>
  <!-- Classic seam lines (all drawn as thin dark strokes over the body). -->
  <g fill="none" stroke="#3A2415" stroke-width="3" stroke-linecap="round">
    <line x1="48" y1="4" x2="48" y2="92"/>
    <line x1="4" y1="48" x2="92" y2="48"/>
    <path d="M16 16 C 36 36, 36 60, 16 80"/>
    <path d="M80 16 C 60 36, 60 60, 80 80"/>
  </g>
  <!-- Subtle highlight near the top-left so the ball reads as round. -->
  <circle cx="34" cy="32" r="10" fill="#F2A35C" opacity="0.5"/>
</svg>
