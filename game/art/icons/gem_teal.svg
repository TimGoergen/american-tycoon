<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <!-- Teal gem: a flat-top HEXAGON cut. Six-sided silhouette, clearly not round or diamond. -->
  <polygon points="30,14 66,14 86,48 66,82 30,82 10,48" fill="#9FD8D4" stroke="#4F8C88" stroke-width="6" stroke-linejoin="round"/>
  <!-- Inner facet hexagon -->
  <polygon points="38,28 58,28 70,48 58,68 38,68 26,48" fill="none" stroke="#74B5B0" stroke-width="3" stroke-linejoin="round"/>
  <!-- Lighter facet highlight (upper-left) -->
  <polygon points="30,18 50,26 38,44 22,44" fill="#CFEEEB" opacity="0.85"/>
</svg>
