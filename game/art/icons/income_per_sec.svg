<svg xmlns="http://www.w3.org/2000/svg" width="120" height="64" viewBox="0 0 120 64">
  <!-- Income-per-second symbol: a gold "$/s" ("dollars per second"). Drawn as vector strokes,
       not <text>, because Godot's SVG rasterizer embeds no fonts (see dollar_bill.svg). Each
       glyph is stroked twice: a DARK-GOLD underlay for an all-gold outline that still reads on
       the cream panel (Tim, 2026-06-28), then the bright gold on top. The "s" is deliberately
       narrower than the "$" so it reads as a small unit suffix, not a second large glyph. -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Dark-gold underlay (the outline) -->
    <g stroke="#8A6A1C" stroke-width="12">
      <line x1="28" y1="8" x2="28" y2="56"/>
      <path d="M 42 17 C 42 9 14 9 14 22 C 14 32 42 32 42 42 C 42 55 14 55 14 47"/>
      <line x1="74" y1="12" x2="58" y2="52"/>
      <path d="M 108 36 C 108 31 90 31 90 36 C 90 41 108 41 108 45 C 108 50 90 50 90 45"/>
    </g>
    <!-- Bright gold on top -->
    <g stroke="#E3B23C" stroke-width="6">
      <line x1="28" y1="8" x2="28" y2="56"/>
      <path d="M 42 17 C 42 9 14 9 14 22 C 14 32 42 32 42 42 C 42 55 14 55 14 47"/>
      <line x1="74" y1="12" x2="58" y2="52"/>
      <path d="M 108 36 C 108 31 90 31 90 36 C 90 41 108 41 108 45 C 108 50 90 50 90 45"/>
    </g>
  </g>
</svg>
