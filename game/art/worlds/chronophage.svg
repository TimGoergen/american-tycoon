<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Chronophage Enclave — home: Tempus. Chrono-Shifters & Temporal Architects.
     A clockwork world wrapped in three crossing temporal rings, clock ticks on the rim,
     and clock hands at the core. Same canvas/centre as earth.svg (circle at 104.7,145.6). -->
<svg width="210mm" height="297mm" viewBox="0 0 210 297" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="chrono" cx="104.7" cy="145.6" r="84" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#3a5fa8"/>
      <stop offset="0.7" stop-color="#1d2d50"/>
      <stop offset="1"   stop-color="#0d1830"/>
    </radialGradient>
    <clipPath id="chronoGlobe"><circle cx="104.7" cy="145.6" r="84"/></clipPath>
  </defs>

  <g opacity="0.9">
    <!-- planet body -->
    <circle cx="104.7" cy="145.6" r="84" fill="url(#chrono)"
            stroke="#E3B23C" stroke-width="1.6" stroke-opacity="0.85"/>

    <!-- a faint time-vortex spiral on the surface -->
    <g clip-path="url(#chronoGlobe)">
      <path d="M104.7,145.6 q14,-2 16,-16 q2,-22 -22,-24 q-32,-2 -34,30 q-2,42 44,44"
            fill="none" stroke="#9FD8D4" stroke-width="1.6" stroke-opacity="0.45"/>
    </g>

    <!-- three crossing temporal rings -->
    <g fill="none" stroke="#E3B23C" stroke-width="1.6" stroke-opacity="0.8">
      <ellipse cx="104.7" cy="145.6" rx="99" ry="34"/>
      <ellipse cx="104.7" cy="145.6" rx="99" ry="34" transform="rotate(60,104.7,145.6)"/>
      <ellipse cx="104.7" cy="145.6" rx="99" ry="34" transform="rotate(120,104.7,145.6)"/>
    </g>

    <!-- clock ticks around the rim: one tick, rotated into twelve -->
    <g stroke="#E3B23C" stroke-width="2.2" stroke-linecap="round" stroke-opacity="0.9">
      <line x1="104.7" y1="63.6" x2="104.7" y2="72.6"/>
      <line x1="104.7" y1="63.6" x2="104.7" y2="72.6" transform="rotate(30,104.7,145.6)"/>
      <line x1="104.7" y1="63.6" x2="104.7" y2="72.6" transform="rotate(60,104.7,145.6)"/>
      <line x1="104.7" y1="63.6" x2="104.7" y2="72.6" transform="rotate(90,104.7,145.6)"/>
      <line x1="104.7" y1="63.6" x2="104.7" y2="72.6" transform="rotate(120,104.7,145.6)"/>
      <line x1="104.7" y1="63.6" x2="104.7" y2="72.6" transform="rotate(150,104.7,145.6)"/>
      <line x1="104.7" y1="63.6" x2="104.7" y2="72.6" transform="rotate(180,104.7,145.6)"/>
      <line x1="104.7" y1="63.6" x2="104.7" y2="72.6" transform="rotate(210,104.7,145.6)"/>
      <line x1="104.7" y1="63.6" x2="104.7" y2="72.6" transform="rotate(240,104.7,145.6)"/>
      <line x1="104.7" y1="63.6" x2="104.7" y2="72.6" transform="rotate(270,104.7,145.6)"/>
      <line x1="104.7" y1="63.6" x2="104.7" y2="72.6" transform="rotate(300,104.7,145.6)"/>
      <line x1="104.7" y1="63.6" x2="104.7" y2="72.6" transform="rotate(330,104.7,145.6)"/>
    </g>

    <!-- clock hands at the core -->
    <g stroke="#F0D49A" stroke-width="2.4" stroke-linecap="round" stroke-opacity="0.95">
      <line x1="104.7" y1="145.6" x2="104.7" y2="106"/>
      <line x1="104.7" y1="145.6" x2="140" y2="158"/>
    </g>
    <circle cx="104.7" cy="145.6" r="3.6" fill="#E3B23C"/>
  </g>
</svg>
