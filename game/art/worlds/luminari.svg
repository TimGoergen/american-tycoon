<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Luminari Collective — home: Solaria Prime. Energy & Plasma Beings.
     A radiant plasma star-world: glowing fusion body, coronal sunburst, plasma swirls.
     Same canvas/centre as earth.svg (circle at 104.7,145.6). -->
<svg width="210mm" height="297mm" viewBox="0 0 210 297" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="solar" cx="104.7" cy="145.6" r="92" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#fff7da"/>
      <stop offset="0.45" stop-color="#ffd34d"/>
      <stop offset="0.8"  stop-color="#f0972a"/>
      <stop offset="1"    stop-color="#d56a1a"/>
    </radialGradient>
    <radialGradient id="solarHalo" cx="104.7" cy="145.6" r="99" gradientUnits="userSpaceOnUse">
      <stop offset="0.82" stop-color="#ffcf5a" stop-opacity="0"/>
      <stop offset="1"    stop-color="#ffcf5a" stop-opacity="0.55"/>
    </radialGradient>
    <clipPath id="solarGlobe"><circle cx="104.7" cy="145.6" r="92"/></clipPath>
  </defs>

  <g opacity="0.88">
    <!-- coronal sunburst: one ray, rotated into twelve -->
    <g fill="#ffcf5a" opacity="0.5">
      <path d="M104.7,38 L101.0,150 L108.4,150 Z"/>
      <path d="M104.7,38 L101.0,150 L108.4,150 Z" transform="rotate(30,104.7,145.6)"/>
      <path d="M104.7,38 L101.0,150 L108.4,150 Z" transform="rotate(60,104.7,145.6)"/>
      <path d="M104.7,38 L101.0,150 L108.4,150 Z" transform="rotate(90,104.7,145.6)"/>
      <path d="M104.7,38 L101.0,150 L108.4,150 Z" transform="rotate(120,104.7,145.6)"/>
      <path d="M104.7,38 L101.0,150 L108.4,150 Z" transform="rotate(150,104.7,145.6)"/>
      <path d="M104.7,38 L101.0,150 L108.4,150 Z" transform="rotate(180,104.7,145.6)"/>
      <path d="M104.7,38 L101.0,150 L108.4,150 Z" transform="rotate(210,104.7,145.6)"/>
      <path d="M104.7,38 L101.0,150 L108.4,150 Z" transform="rotate(240,104.7,145.6)"/>
      <path d="M104.7,38 L101.0,150 L108.4,150 Z" transform="rotate(270,104.7,145.6)"/>
      <path d="M104.7,38 L101.0,150 L108.4,150 Z" transform="rotate(300,104.7,145.6)"/>
      <path d="M104.7,38 L101.0,150 L108.4,150 Z" transform="rotate(330,104.7,145.6)"/>
    </g>

    <!-- soft outer glow -->
    <circle cx="104.7" cy="145.6" r="99" fill="url(#solarHalo)"/>

    <!-- the star-world body -->
    <circle cx="104.7" cy="145.6" r="92" fill="url(#solar)"
            stroke="#ffe9a8" stroke-width="1.8" stroke-opacity="0.85"/>

    <!-- plasma swirls + flares on the surface -->
    <g clip-path="url(#solarGlobe)">
      <g fill="none" stroke="#fff3c4" stroke-width="2.4" stroke-linecap="round" opacity="0.7">
        <path d="M58,118 q34,-20 76,2"/>
        <path d="M66,168 q40,22 84,-2"/>
        <path d="M74,96 q26,18 18,46"/>
        <path d="M150,150 q-14,26 -44,30"/>
      </g>
      <g fill="#fff6d6" opacity="0.85">
        <circle cx="86"  cy="112" r="6"/>
        <circle cx="138" cy="128" r="4.5"/>
        <circle cx="112" cy="178" r="5"/>
        <circle cx="78"  cy="156" r="3.5"/>
      </g>
    </g>
  </g>
</svg>
