<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Mycelium Unity — home: Spore-Deep. Fungal & Hive-Mind Bio-Swarms.
     A damp planet laced with bio-luminescent mycelial veins, mushroom domes, drifting spores.
     Same canvas/centre as earth.svg (circle at 104.7,145.6). -->
<svg width="210mm" height="297mm" viewBox="0 0 210 297" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="myco" cx="88" cy="124" r="108" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4d4663"/>
      <stop offset="1" stop-color="#201a30"/>
    </radialGradient>
    <clipPath id="mycoGlobe"><circle cx="104.7" cy="145.6" r="92"/></clipPath>
  </defs>

  <g opacity="0.88">
    <!-- planet body -->
    <circle cx="104.7" cy="145.6" r="92" fill="url(#myco)"
            stroke="#aef0c4" stroke-width="1.8" stroke-opacity="0.8"/>

    <g clip-path="url(#mycoGlobe)">
      <!-- branching mycelial network (glowing veins) -->
      <g fill="none" stroke="#aef0c4" stroke-width="1.4" stroke-linecap="round" opacity="0.85">
        <path d="M104.7,145.6 C90,131 78,122 58,118 C70,116 80,108 86,96"/>
        <path d="M104.7,145.6 C118,160 132,168 152,170 C140,176 134,188 132,200"/>
        <path d="M104.7,145.6 C100,120 96,100 90,78 C98,90 110,92 122,86"/>
        <path d="M104.7,145.6 C112,128 128,118 142,112 C150,122 162,124 174,122"/>
        <path d="M104.7,145.6 C96,162 84,176 70,186 C66,174 54,170 44,172"/>
        <path d="M104.7,145.6 C120,140 136,142 150,150"/>
      </g>
      <!-- mushroom domes anchored on the surface -->
      <g>
        <ellipse cx="86"  cy="96"  rx="9"  ry="5.5" fill="#9FD8D4" opacity="0.9"/>
        <rect x="84.5" y="96" width="3" height="9" fill="#cdbce0" opacity="0.85"/>
        <ellipse cx="132" cy="200" rx="8"  ry="5"  fill="#9FD8D4" opacity="0.9"/>
        <rect x="130.5" y="200" width="3" height="8" fill="#cdbce0" opacity="0.85"/>
        <ellipse cx="174" cy="122" rx="7"  ry="4.5" fill="#9FD8D4" opacity="0.9"/>
        <rect x="172.5" y="122" width="2.6" height="7" fill="#cdbce0" opacity="0.85"/>
        <ellipse cx="70"  cy="186" rx="7"  ry="4.5" fill="#9FD8D4" opacity="0.9"/>
        <rect x="68.5" y="186" width="2.6" height="7" fill="#cdbce0" opacity="0.85"/>
      </g>
    </g>

    <!-- drifting spores around the world -->
    <g fill="#aef0c4" opacity="0.7">
      <circle cx="30"  cy="120" r="2.2"/>
      <circle cx="184" cy="96"  r="1.8"/>
      <circle cx="196" cy="170" r="2.4"/>
      <circle cx="40"  cy="210" r="1.6"/>
      <circle cx="150" cy="44"  r="2"/>
      <circle cx="64"  cy="58"  r="1.6"/>
    </g>
  </g>
</svg>
